packages:
  - 'frontend/*'
  - 'components'

linkWorkspacePackages: true
# pin dependencies instead of using ranges
saveExact: true
savePrefix: ""

catalogs:
  dependencies:
    "@headlessui/react": ^2.2.3
    "@heroicons/react": ^2.2.0
    "@tanstack/react-form": ^1.1.2
    "@tanstack/react-router": ^1.112.0
    "@tanstack/react-table": ^8.21.3
    clsx: ^2.1.1
    motion: ^12.38.0
    i18next: ^26.0.1
    i18next-browser-languagedetector: ^8.0.4
    i18next-http-backend: ^4.0.0
    react: ^19.0.0
    react-dom: ^19.0.0
    react-i18next: ^17.0.0
    react-toastify: ^11.0.5
    recharts: ^3.8.1
    "@zxcvbn-ts/core": ^3.0.4
    "@zxcvbn-ts/language-common": ^3.0.4
    "@zxcvbn-ts/language-de": ^3.0.2
    "@zxcvbn-ts/language-en": ^3.0.2

  devDependencies:
    "@eslint/js": 10.0.1
    "@openapitools/openapi-generator-cli": 2.39.0
    "@tailwindcss/vite": ^4.0.7
    "@tanstack/router-devtools": ^1.131.7
    "@tanstack/router-plugin": ^1.112.0
    "@types/react": 19.2.15
    "@types/react-dom": 19.2.3
    "@vitejs/plugin-react": 6.0.3
    "@vitejs/plugin-react-swc": 4.3.1
    eslint: 10.5.0
    eslint-plugin-jsdoc: 63.0.7
    eslint-plugin-react-refresh: 0.5.3
    prettier: 3.8.4
    prettier-plugin-tailwindcss: 0.8.0
    tailwindcss: 4.3.1
    typescript: 6.0.3
    typescript-eslint: 8.62.0
    vite: 8.1.0
    vite-plugin-static-copy: 4.1.1
    vite-plugin-svgr: 5.2.0

allowBuilds:
  '@nestjs/core': false
  '@openapitools/openapi-generator-cli': false
  '@swc/core': true
  '@tsparticles/engine': false
  esbuild: true
