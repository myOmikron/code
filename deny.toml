[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # rsa implementation vulnerable to Marvin attack, a side-channel timing attack; fix is included in rsa v0.10 (currently a release candidate)
    # "RUSTSEC-2023-0071", # openidconnect depends on rsa

    # proc-macro-error2 is unmaintained
    # "RUSTSEC-2026-0173", # matrix-sdk depends on it
]

[licenses]
version = 2
private = { ignore = true }
clarify = []
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]


[sources]
unknown-git = "deny"
