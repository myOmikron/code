<!doctype html>
<html lang="de">
  <head><meta charset="UTF-8" /><title>Grisly Salvage PLST GK1-64 Regression</title></head>
  <body data-status="running">
    <pre id="result">Test läuft …</pre>
    <script type="module">
      import { findAllCardMatches } from "../src/allCardIndex.ts";
      import { createScanSignatures, detectCardBounds } from "../src/imageHash.ts";

      function loadImage(source) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = source;
        });
      }

      try {
        const photo = await loadImage("./fixtures/grisly-salvage-plst-gk1-64.png");
        const bounds = detectCardBounds(photo);
        const scanSignatures = createScanSignatures(photo);
        const matches = await findAllCardMatches(scanSignatures.identification, 3, undefined, scanSignatures.printing);
        const best = matches[0];
        const passed = Boolean(
          bounds &&
          best?.card.setCode === "PLST" &&
          best?.card.collectorNumber === "GK1-64",
        );
        document.body.dataset.status = passed ? "passed" : "failed";
        document.querySelector("#result").textContent = JSON.stringify({
          passed,
          expected: "PLST #GK1-64",
          matches: matches.map((match) => ({
            card: `${match.card.setCode} #${match.card.collectorNumber}`,
            name: match.card.name,
            similarity: match.similarity,
          })),
          bounds,
        }, null, 2);
      } catch (error) {
        document.body.dataset.status = "failed";
        document.querySelector("#result").textContent = String(error);
      }
    </script>
  </body>
</html>
